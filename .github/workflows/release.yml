name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Determine version and validate
        id: version
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            # Release created manually - extract version from release tag
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION=${VERSION#v}
            echo "Manual release detected: $VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Tag pushed - extract version from tag
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION=${VERSION#v}
            echo "Tag pushed: $VERSION"
          else
            # Manual workflow dispatch - use version from package.json
            VERSION=$(node -p "require('./plugins/kuadrant/package.json').version")
            echo "Manual workflow dispatch: $VERSION"

            # Check if tag already exists
            if git rev-parse "v$VERSION" >/dev/null 2>&1; then
              echo "ERROR: Tag v$VERSION already exists"
              echo "Please update version in package.json or delete the existing tag:"
              echo "  git tag -d v$VERSION"
              echo "  git push origin :refs/tags/v$VERSION"
              exit 1
            fi

            # Create and push tag
            git tag "v$VERSION"
            git push origin "v$VERSION"
            echo "Created and pushed tag: v$VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

          # Determine if pre-release
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "Stable release"
          else
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "Pre-release"
          fi

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn build

      - name: Create plugin artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Build frontend tarball
          cd plugins/kuadrant
          npm pack
          mv kuadrant-plugin-kuadrant-*.tgz ../../kuadrant-plugin-kuadrant-${VERSION}.tgz
          cd ../..

          # Build backend tarball
          cd plugins/kuadrant-backend
          npm pack
          mv kuadrant-plugin-kuadrant-backend-*.tgz ../../kuadrant-plugin-kuadrant-backend-${VERSION}.tgz
          cd ../..

          echo "Created artifacts:"
          ls -lh *.tgz

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "First release - showing all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            echo "Changes since $PREV_TAG"
            COMMITS=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          fi

          # Create changelog
          cat > CHANGELOG.md << EOF
          ## What's Changed

          $COMMITS

          ## Installation

          ### Using npm/yarn

          \`\`\`bash
          # Frontend Plugin
          yarn add @kuadrant/plugin-kuadrant@${VERSION}

          # Backend Plugin
          yarn add @kuadrant/plugin-kuadrant-backend@${VERSION}
          \`\`\`

          ### Using tarball artifacts (attached below)

          \`\`\`bash
          # Frontend Plugin
          yarn add ./kuadrant-plugin-kuadrant-${VERSION}.tgz

          # Backend Plugin
          yarn add ./kuadrant-plugin-kuadrant-backend-${VERSION}.tgz
          \`\`\`

          ## Links

          - [Frontend Plugin on npm](https://www.npmjs.com/package/@kuadrant/plugin-kuadrant/v/${VERSION})
          - [Backend Plugin on npm](https://www.npmjs.com/package/@kuadrant/plugin-kuadrant-backend/v/${VERSION})
          - [Documentation](https://github.com/Kuadrant/kuadrant-backstage-plugin/blob/main/README.md)
          - [Frontend Plugin README](https://github.com/Kuadrant/kuadrant-backstage-plugin/blob/main/plugins/kuadrant/README.md)
          - [Backend Plugin README](https://github.com/Kuadrant/kuadrant-backstage-plugin/blob/main/plugins/kuadrant-backend/README.md)
          EOF

          cat CHANGELOG.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            *.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          IS_PRERELEASE="${{ steps.version.outputs.prerelease }}"

          echo "## GitHub Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $TAG" >> $GITHUB_STEP_SUMMARY

          if [ "$IS_PRERELEASE" == "true" ]; then
            echo "**Type:** Pre-release" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Type:** Stable release" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo "- kuadrant-plugin-kuadrant-${VERSION}.tgz" >> $GITHUB_STEP_SUMMARY
          echo "- kuadrant-plugin-kuadrant-backend-${VERSION}.tgz" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "- Publish workflow will automatically publish to npm" >> $GITHUB_STEP_SUMMARY
          echo "- Release URL: https://github.com/${{ github.repository }}/releases/tag/$TAG" >> $GITHUB_STEP_SUMMARY
